services:
  #------------------------------------nginx------------------------------------#
  nginx:
    container_name: nginx
    image: nginx
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build: infrastructure/nginx
    restart: unless-stopped
    # FIX #8: Removed entrypoint override — CMD is defined in the Dockerfile
    ports:
      - "443:443"
    volumes:
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      # FIX #9: curl is now installed in the nginx Dockerfile
      # FIX #15: Relaxed healthcheck intervals + added start_period
      test: [ "CMD", "curl", "-k", "https://localhost:443" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # FIX #14: Added logging limits to prevent disk exhaustion
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    networks:
      - microservices_network
    depends_on:
      front:
        condition: service_healthy
  #------------------------------------frontend------------------------------------#
  front:
    container_name: front
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build: frontend
    image: front
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://front:3003" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    networks:
      - microservices_network
  #------------------------------------backend services------------------------------------#


  #------auth service------#
  auth:
    container_name: auth
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    restart: unless-stopped
    image: auth
    volumes:
      - ./prisma:/app/prisma
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://auth:3004/api/auth" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres_db:5432/shared_db?schema=public
    networks:
      - microservices_network
    depends_on:
      postgres:
        condition: service_healthy
  #------chat service------#
  chat:
    container_name: chat
    build:
      context: .
      dockerfile: services/chat/Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: chat
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://chat:3001/api/chat" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres_db:5432/shared_db?schema=public
    networks:
      - microservices_network
    volumes:
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
  #------user management service------#
  user:
    container_name: user
    build:
      context: .
      dockerfile: services/user_management/Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: user
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://user:3002/api/users" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    networks:
      - microservices_network
    volumes:
      - ./prisma:/app/prisma
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres_db:5432/shared_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
  #------listings service------#
  listings:
    container_name: listings
    build:
      context: .
      dockerfile: services/listings/Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: listings
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://listings:3005/api/listings" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./prisma:/app/prisma
      - ./uploads:/app/uploads

    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres_db:5432/shared_db?schema=public
    networks:
      - microservices_network
    depends_on:
      postgres:
        condition: service_healthy
  #------postgres service------#
  postgres:
    image: postgres:16
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    container_name: postgres_db
    restart: unless-stopped
    volumes:
      - ./infrastructure/postgres/init/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    networks:
      - microservices_network
  #------AI service------#
  ai:
    container_name: ai
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: ai
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", http://ai:3006/api/ai/model/status ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres_db:5432/shared_db?schema=public
    networks:
      - microservices_network
    volumes:
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy



  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION}
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION}
    container_name: logstash
    group_add:
      - "982"
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./infrastructure/logging/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./infrastructure/logging/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9600/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION}
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./infrastructure/logging/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - kibana_data:/usr/share/kibana/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf -u elastic:${ELASTIC_PASSWORD} http://localhost:5601/api/status || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat:
    image: docker.elastic.co/beats/filebeat:${ELASTIC_VERSION}
    container_name: filebeat
    user: root
    command: [ "filebeat", "-e", "--strict.perms=false" ]
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    volumes:
      - ./infrastructure/logging/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: [ "CMD-SHELL", "filebeat test config --strict.perms=false 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy

  es-ilm-setup:
    image: alpine:3.19
    container_name: es-ilm-setup
    entrypoint: [ "sh", "-c", "apk add --no-cache curl && sh /scripts/setup-ilm.sh" ]
    environment:
      - ES_USER=elastic
      - ES_PASS=${ELASTIC_PASSWORD}
    volumes:
      - ./infrastructure/logging/elasticsearch/setup-ilm.sh:/scripts/setup-ilm.sh:ro
    healthcheck:
      test: [ "CMD-SHELL", "test -f /tmp/ilm-setup-done || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana-dashboards:
    image: alpine:3.19
    container_name: kibana-dashboards
    entrypoint: [ "sh", "-c", "apk add --no-cache curl && sh /scripts/import-dashboard.sh" ]
    environment:
      - ES_USER=elastic
      - ES_PASS=${ELASTIC_PASSWORD}
    volumes:
      - ./infrastructure/logging/kibana/import-dashboard.sh:/scripts/import-dashboard.sh:ro
      - ./infrastructure/logging/kibana/platform-logs-dashboard.ndjson:/usr/share/kibana/dashboards/platform-logs-dashboard.ndjson:ro
    healthcheck:
      test: [ "CMD-SHELL", "test -f /tmp/dashboard-imported || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 15s
    networks:
      - elk
    depends_on:
      kibana:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./infrastructure/logging/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/logging/prometheus:/etc/prometheus
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - microservices_network
    depends_on:
      node-exporter:
        condition: service_healthy

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - microservices_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9100/metrics" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - microservices_network

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/blackbox/blackbox.yml:/config/blackbox.yml
    command:
      - '--config.file=/config/blackbox.yml'
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9115/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - microservices_network

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      # ── Level 3: RBAC — lock down who can do what ──────────────
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"          # require login
      GF_USERS_ALLOW_SIGN_UP: "false"            # disable self-registration
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer      # new users default to Viewer
      GF_AUTH_DISABLE_LOGIN_FORM: "false"         # keep login for the admin
      GF_SECURITY_ADMIN_USER: admin              # single admin account
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}  # from .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - microservices_network
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # ── Level 1: Provisioning — dashboards loaded as-code ──────
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy

  #------------------------------------backups & DR------------------------------------#
  db-backup:
    image: postgres:16
    container_name: db-backup
    entrypoint: [ "sh", "-c", "while true; do sh /scripts/backup.sh; sleep 86400; done" ]
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST: postgres_db
      PGPASSWORD: ${DB_PASS}
    volumes:
      - ./infrastructure/postgres/backup.sh:/scripts/backup.sh:ro
      - ./infrastructure/postgres/restore.sh:/scripts/restore.sh:ro
      - db_backups:/backups
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h postgres_db -U ${DB_USER} || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - microservices_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  elk:
    driver: bridge
  microservices_network:
    driver: bridge
  logging:
    driver: bridge
volumes:
  postgres_data:
    driver: local
  elasticsearch_data:
    driver: local
  kibana_data:
    driver: local
  db_backups:
    driver: local
  grafana_data:
    driver: local