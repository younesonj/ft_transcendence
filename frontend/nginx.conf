server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localhost;
    client_max_body_size 25m;

    # SSL config (keep yours if already defined)
    # ssl_certificate ...
    # ssl_certificate_key ...

    # --------Enable ModSecurity---------
    modsecurity on;
    modsecurity_rules 'SecAuditEngine On
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity.log
';

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # =============================
    # FRONTEND (React SPA)
    # =============================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =============================
    # AUTH SERVICE
    # =============================
    location /auth/ {
        proxy_pass http://auth:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =============================
    # USER SERVICE
    # =============================
    location /users/ {
        proxy_pass http://user:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =============================
    # CHAT SERVICE
    # =============================
    location /chat/ {
        proxy_pass http://chat:3003/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # =============================
    # LISTINGS SERVICE
    # =============================
    location /listings/ {
        client_max_body_size 25m;
        proxy_pass http://listings:3004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
