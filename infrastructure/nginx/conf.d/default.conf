server
{
    listen 443 ssl;
    server_name localhost;
    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 25m;
    ssl_certificate /etc/nginx/certs/transcendence.crt;
    ssl_certificate_key /etc/nginx/certs/transcendence.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Uploaded Assets ───────────────────────────────────────────
    location /uploads/avatars/
    {
        proxy_pass http://user:3002/uploads/avatars/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/listings/ 
    {
        proxy_pass http://listings:3005/uploads/listings/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    
    # ── Frontend ──────────────────────────────────────────────────
    location /
    {
        proxy_pass http://front:3003;

        # FIX #1d: Forward real client info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FIX #1e: WebSocket upgrade support (needed if chat uses WS)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location /api/ai/
    {
        proxy_pass http://ai:3006/api/ai/;

        # FIX #1d: Forward real client info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # FIX #1e: WebSocket upgrade support (needed if chat uses WS)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }

    # ── Auth Service ──────────────────────────────────────────────
    # FIX #1a: Added trailing slash to proxy_pass so path rewriting works correctly
    #   Before: /api/auth/login → http://auth:3004/api/authlogin  (BROKEN)
    #   After:  /api/auth/login → http://auth:3004/api/auth/login  (CORRECT)
    location /api/auth/
    {
        proxy_pass http://auth:3004/api/auth/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Chat Service ──────────────────────────────────────────────
    # FIX #1a: Added trailing slash to proxy_pass
    location /api/chat/
    {
        proxy_pass http://chat:3001/api/chat/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for real-time chat
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── User Management Service ───────────────────────────────────
    # FIX #1b: Changed /api/user → /api/users/ to match the backend's global prefix "api/users"
    # FIX #1a: Added trailing slashes
    location /api/users/
    {
        proxy_pass http://user:3002/api/users/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Listings Service ──────────────────────────────────────────
    # FIX #1c: Added trailing slashes
    location /api/listings/
    {
        client_max_body_size 25m;
        proxy_pass http://listings:3005/api/listings/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /grafana/
    {
        proxy_pass http://grafana:3000/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
