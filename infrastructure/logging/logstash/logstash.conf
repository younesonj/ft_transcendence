input {
  beats {
    port => 5044
  }
}

filter {
  # ── 1. Extract container name from Docker log path ──────────────────
  #    /var/lib/docker/containers/<ID>/<ID>-json.log
  grok {
    match => { "[log][file][path]" => "/var/lib/docker/containers/%{DATA:container_id}/" }
    tag_on_failure => []
  }

  # Look up real container name via Docker socket (mounted read-only)
  if [container_id] {
    ruby {
      init => '@cache = {}; @cache_ttl = {}; @ttl = 300'
      code => '
        cid = event.get("container_id")
        now = Time.now.to_i

        # Use cache if fresh
        if @cache[cid] && @cache_ttl[cid] && (now - @cache_ttl[cid]) < @ttl
          event.set("[container][name]", @cache[cid])
          event.set("[container][id]", cid)
        else
          begin
            require "socket"
            require "json"
            sock = UNIXSocket.new("/var/run/docker.sock")
            sock.write("GET /containers/#{cid}/json HTTP/1.0\r\nHost: localhost\r\n\r\n")
            resp = sock.read
            sock.close
            body = resp.split("\r\n\r\n", 2).last
            info = JSON.parse(body)
            name = (info["Name"] || "").sub(/^\//, "")
            if name.empty?
              name = cid[0..11]
            end
            @cache[cid] = name
            @cache_ttl[cid] = now
            event.set("[container][name]", name)
            event.set("[container][id]", cid)
          rescue => e
            event.set("[container][name]", cid[0..11])
            event.set("[container][id]", cid)
          end
        end
      '
    }
  }

  # ── 2. Parse log formats ────────────────────────────────────────────

  # 2a. Nginx combined log format
  #     172.20.0.1 - - [09/Mar/2026:09:42:49 +0000] "GET /api/chat/messages/inbox HTTP/1.1" 200 2 "..." "..."
  grok {
    match => { "message" => "%{IPORHOST:client_ip} - %{DATA:ident} \[%{HTTPDATE:nginx_ts}\] \"%{WORD:http_method} %{URIPATH:uri}(?:%{URIPARAM:uri_params})? HTTP/%{NUMBER:http_version}\" %{NUMBER:status:int} %{NUMBER:bytes:int} \"%{DATA:referrer}\" \"%{DATA:user_agent}\"" }
    tag_on_failure => ["_not_nginx"]
  }

  if "_not_nginx" not in [tags] {
    mutate { add_field => { "log_level" => "INFO" } }
    mutate { remove_field => ["nginx_ts", "ident", "http_version", "uri_params"] }
  }

  # 2b. NestJS format
  #     [Nest] 178  - 03/09/2026, 9:31:35 AM     LOG [RouterExplorer] Mapped ...
  if "_not_nginx" in [tags] {
    grok {
      match => { "message" => "\[Nest\]\s+%{NUMBER:pid}\s+-\s+%{DATA:nest_ts}\s+%{WORD:log_level}\s+\[%{DATA:nest_context}\]\s+%{GREEDYDATA:log_message}" }
      tag_on_failure => ["_not_nest"]
      remove_tag => ["_not_nginx"]
    }
    if "_not_nest" not in [tags] {
      mutate { remove_field => ["nest_ts", "pid"] }
    }
  }

  # 2c. FastAPI / Uvicorn format
  #     INFO:     172.20.0.11:47560 - "GET /metrics HTTP/1.1" 200 OK
  if "_not_nest" in [tags] {
    grok {
      match => { "message" => "%{WORD:log_level}:\s+%{IP:client_ip}:%{NUMBER:client_port}\s+-\s+\"%{WORD:http_method}\s+%{URIPATH:uri}(?:%{URIPARAM:uri_params})?\s+HTTP/%{NUMBER:http_version}\"\s+%{NUMBER:status:int}\s*%{GREEDYDATA:status_text}" }
      tag_on_failure => ["_not_fastapi"]
      remove_tag => ["_not_nest"]
    }
    if "_not_fastapi" not in [tags] {
      mutate { remove_field => ["client_port", "http_version", "status_text", "uri_params"] }
    }
  }

  # 2d. Generic level extraction: lines starting with a log level keyword
  #     time=... level=ERROR ...   or   ERROR: something
  if "_not_fastapi" in [tags] {
    grok {
      match => { "message" => [
        "(?i)level=%{WORD:log_level}",
        "(?i)^%{LOGLEVEL:log_level}[:\s]"
      ] }
      tag_on_failure => ["_no_level"]
      remove_tag => ["_not_fastapi"]
    }
  }

  # 2e. Plain-text startup messages — default to INFO
  if "_no_level" in [tags] {
    mutate {
      add_field => { "log_level" => "INFO" }
      remove_tag => ["_no_level"]
    }
  }

  # ── 3. Normalise ────────────────────────────────────────────────────
  mutate { uppercase => ["log_level"] }

  # GeoIP for nginx / fastapi client IPs
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
      tag_on_failure => ["_geoip_lookup_failure"]
    }
  }

  # ── 4. Cleanup internal fields ──────────────────────────────────────
  mutate {
    remove_field => ["container_id"]
    remove_tag   => ["_not_nginx", "_not_nest", "_not_fastapi", "_no_level",
                      "_geoip_lookup_failure", "beats_input_codec_plain_applied"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "test-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ilm_enabled => true
    ilm_policy => "logs-retention-policy"
  }
}