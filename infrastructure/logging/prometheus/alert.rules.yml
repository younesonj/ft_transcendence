# ──────────────────────────────────────────────────────────────
#  Prometheus Alerting Rules — ft_transcendence
#  Covers: service down, high latency, resource exhaustion
# ──────────────────────────────────────────────────────────────
groups:
  # ── Service Health ─────────────────────────────────────────
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }}/{{ $labels.instance }} is DOWN"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: BlackboxProbeFailed
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Endpoint {{ $labels.instance }} probe failed"
          description: "Blackbox probe to {{ $labels.instance }} has been failing for 2 minutes."

      - alert: BlackboxSlowProbe
        expr: probe_duration_seconds > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Slow response from {{ $labels.instance }}"
          description: "Probe to {{ $labels.instance }} is taking {{ $value }}s (threshold: 2s)."

  # ── HTTP Errors ────────────────────────────────────────────
  - name: http_errors
    rules:
      - alert: HighHTTP5xxRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (instance, job)
            /
            sum(rate(http_requests_total[5m])) by (instance, job)
          ) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "More than 5% of requests returning 5xx on {{ $labels.instance }}."

      - alert: HighHTTP4xxRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"4.."}[5m])) by (instance, job)
            /
            sum(rate(http_requests_total[5m])) by (instance, job)
          ) > 0.25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High 4xx error rate on {{ $labels.job }}"
          description: "More than 25% of requests returning 4xx on {{ $labels.instance }}."

  # ── System Resources (node-exporter) ───────────────────────
  - name: system_resources
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%)."

      - alert: CriticalCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 95%)."

      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 85%)."

      - alert: CriticalMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 95%)."

      - alert: DiskSpaceRunningLow
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "Disk usage is {{ $value | printf \"%.1f\" }}% (threshold: 85%)."

      - alert: DiskSpaceCritical
        expr: (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk space critical on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "Disk usage is {{ $value | printf \"%.1f\" }}% (threshold: 95%)."

  # ── High Latency ──────────────────────────────────────────
  - name: latency
    rules:
      - alert: HighRequestLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "95th percentile latency is {{ $value | printf \"%.2f\" }}s (threshold: 1s)."
